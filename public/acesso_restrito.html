<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Conta - Devolva Aqui</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #000;
  color: #fff;
}

header {
  padding: 20px;
  text-align: center;
  font-weight: bold;
  font-size: 20px;
  color: #1DB954;
  border-bottom: 1px solid #111;
}

.container {
  max-width: 500px;
  margin: 60px auto;
  padding: 30px;
  background: #121212;
  border-radius: 20px;
  border: 1px solid #1a1a1a;
}

h1 {
  font-size: 24px;
  margin-bottom: 10px;
  text-align: center;
}

p.subtitle {
  color: #aaa;
  text-align: center;
  margin-bottom: 30px;
  font-size: 14px;
}

.form-group {
  margin-bottom: 20px;
}

label {
  display: block;
  margin-bottom: 8px;
  color: #1DB954;
  font-size: 14px;
  font-weight: 600;
}

input {
  width: 100%;
  padding: 12px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 8px;
  color: #fff;
  font-size: 16px;
}

input:focus {
  outline: none;
  border-color: #1DB954;
}

input[readonly] {
  color: #666;
  cursor: not-allowed;
}

.btn {
  width: 100%;
  background: #1DB954;
  color: #000;
  padding: 15px;
  border-radius: 50px;
  border: none;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
  margin-top: 10px;
}

.btn:hover {
  background: #1ed760;
  transform: scale(1.02);
}

footer {
  text-align: center;
  padding: 40px;
  color: #666;
  font-size: 12px;
}
</style>
</head>

<body>

<header>
DEVOLVA AQUI
</header>

<div class="container">
  <h1>Minha Conta</h1>
  <p class="subtitle">Atualize seus dados de contato abaixo.</p>

  <form id="perfilForm">
    <div class="form-group">
      <label>CPF (Identificador)</label>
      <input type="text" id="cpf" placeholder="Digite seu CPF para validar" required>
    </div>

    <div class="form-group">
      <label>Novo E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" required>
    </div>

    <div class="form-group">
      <label>Novo Telefone</label>
      <input type="text" id="telefone" placeholder="(00) 00000-0000" required>
    </div>

    <div class="form-group">
      <label>Nova Cidade</label>
      <input type="text" id="cidade" placeholder="Sua Cidade" required>
    </div>

    <button type="submit" class="btn">Salvar Alterações</button>
  </form>
</div>

<footer>
© Devolva Aqui — Todos os direitos reservados
</footer>

<script>
document.getElementById('perfilForm').onsubmit = async (e) => {
    e.preventDefault();

    const dados = {
        cpf: document.getElementById('cpf').value,
        email: document.getElementById('email').value,
        telefone: document.getElementById('telefone').value,
        cidade: document.getElementById('cidade').value
    };

    try {
        const res = await fetch('/perfil/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });

        const result = await res.json();

        if (result.success) {
            alert('Dados atualizados com sucesso!');
        } else {
            alert('Erro ao atualizar. Verifique se o CPF está correto.');
        }
    } catch (err) {
        console.error('Erro na requisição:', err);
        alert('Erro de conexão com o servidor.');
    }
};
</script>

</body>
</html>
