    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .form-container { max-width: 400px; margin: 0 auto; background: #111; padding: 20px; border-radius: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; border-radius: 5px; border: none; }
        button { width: 100%; padding: 15px; background: #1DB954; color: #000; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Ativar minha Tag</h2>
        <form id="registerForm">
            <input type="text" name="codigo" placeholder="Código da Tag (ex: ABC-123)" required>
            <input type="text" name="nome" placeholder="Seu Nome Completo" required>
            <input type="text" name="cpf" placeholder="Seu CPF" required>
            <input type="text" name="objeto" placeholder="O que você vai identificar? (ex: Chaves)" required>
            <input type="text" name="endereco" placeholder="Endereço para Devolução" required>
            <button type="submit">Ativar Agora</button>
        </form>
    </div>

    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            const res = await fetch('/users', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if(res.ok) {
                fbq('track', 'CompleteRegistration');
                alert('Tag ativada com sucesso!');
                window.location.href = "/";
            } else {
                alert('Erro ao ativar. Verifique o código.');
            }
        };
    </script>
</body>
</html>
