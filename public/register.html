<!-- Dentro do seu arquivo register.html -->
<form id="registerForm" style="text-align: left; max-width: 400px; margin: 0 auto; padding: 20px;">
    <h2 style="color: #1DB954; text-align: center;">Cadastrar Minha Tag</h2>

    <label>Código da Tag (6 dígitos):</label>
    <input type="text" name="codigo" maxlength="6" required style="width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff;">

    <label>Nome Completo:</label>
    <input type="text" name="nome" required style="width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff;">

    <label>E-mail:</label>
    <input type="email" name="email" required style="width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff;">

    <label>WhatsApp:</label>
    <input type="tel" name="whatsapp" placeholder="(00) 00000-0000" required style="width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff;">

    <label>CPF:</label>
    <input type="text" name="cpf" maxlength="14" required style="width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff;">

    <label>Data de Nascimento:</label>
    <input type="date" name="nascimento" required style="width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff;">

    <label>O que você vai rastrear? (Ex: Chave do Carro):</label>
    <select name="objeto" required style="width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff;">
        <option value="">Selecione...</option>
        <option value="Chave de Carro">Chave de Carro</option>
        <option value="Mochila">Mochila</option>
        <option value="Carteira">Carteira</option>
        <option value="Notebook">Notebook</option>
        <option value="Pet">Coleira de Pet</option>
        <option value="Outro">Outro</option>
    </select>

    <button type="submit" style="width: 100%; background: #1DB954; color: #000; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px;">
        ATIVAR MINHA TAG
    </button>
</form>

<script>
document.getElementById('registerForm').onsubmit = async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());

    const response = await fetch('/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });

    const result = await response.json();
    if (result.success) {
        alert('Tag ativada com sucesso!');
        window.location.href = '/perfil';
    } else {
        alert(result.message || 'Erro ao cadastrar informações.');
    }
};
</script>
