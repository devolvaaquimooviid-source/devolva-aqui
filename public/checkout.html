<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Devolva Aqui</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }

body {
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container {
  width:100%;
  max-width:500px;
  background:#111;
  padding:30px;
  border-radius:20px;
  border:1px solid #222;
}

h1 {
  text-align:center;
  margin-bottom:20px;
}

input {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:#fff;
}

button {
  width:100%;
  padding:14px;
  background:#1DB954;
  border:none;
  border-radius:50px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.produto {
  text-align:center;
  margin-bottom:20px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

  <h1>Finalizar compra</h1>

  <div class="produto" id="produtoInfo"></div>

  <input type="text" id="nome" placeholder="Nome completo" required>
  <input type="email" id="email" placeholder="Email" required>
  <input type="text" id="telefone" placeholder="Telefone" required>
  <input type="text" id="cpf" placeholder="CPF (para nota fiscal)" required>

  <input type="text" id="cep" placeholder="CEP" required>
  <input type="text" id="rua" placeholder="Rua" required>
  <input type="text" id="numero" placeholder="Número" required>
  <input type="text" id="cidade" placeholder="Cidade" required>
  <input type="text" id="estado" placeholder="Estado" required>

  <button onclick="finalizarCompra()">Ir para pagamento</button>

</div>

<script>

const urlParams = new URLSearchParams(window.location.search);
const produto = urlParams.get('produto');

const produtos = {
  kit3: { nome: "Kit 3 Tags", valor: "R$ 17,90" },
  kit6: { nome: "Kit 6 Tags", valor: "R$ 29,90" },
  kit12: { nome: "Kit 12 Tags", valor: "R$ 49,90" }
};

if (produto && produtos[produto]) {
  document.getElementById('produtoInfo').innerHTML =
    produtos[produto].nome + " - " + produtos[produto].valor;
}

async function finalizarCompra() {

  const nome = document.getElementById('nome').value;
  const email = document.getElementById('email').value;
  const telefone = document.getElementById('telefone').value;
  const cpf = document.getElementById('cpf').value;

  const cep = document.getElementById('cep').value;
  const rua = document.getElementById('rua').value;
  const numero = document.getElementById('numero').value;
  const cidade = document.getElementById('cidade').value;
  const estado = document.getElementById('estado').value;

  if (!nome || !email || !telefone || !cpf) {
    alert("Preencha todos os campos obrigatórios");
    return;
  }

  try {

    const response = await fetch('/orders/create', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        nome,
        email,
        telefone,
        cpf,
        produto,
        cep,
        rua,
        numero,
        cidade,
        estado
      })
    });

    const data = await response.json();

    if (data.success) {

      let link = "";

      if (produto === "kit3") link = "https://mpago.la/279KBXJ";
      if (produto === "kit6") link = "https://mpago.la/2A3iSD3";
      if (produto === "kit12") link = "https://mpago.la/11eaKEp";

      window.location.href = link;

    } else {
      alert("Erro: " + data.error);
    }

  } catch (error) {
    console.error(error);
    alert("Erro ao finalizar pedido");
  }

}

</script>

</body>
</html>
