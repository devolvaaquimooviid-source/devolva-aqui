<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Devolva Aqui</title>

    <!-- Meta Pixel Code -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1322943693033831');
    fbq('track', 'PageView');
    fbq('track', 'InitiateCheckout');
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1322943693033831&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->

    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h2 { color: #1DB954; }
        form { width: 100%; max-width: 500px; display: flex; flex-direction: column; background: #111; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        label { margin-bottom: 5px; font-size: 0.9em; color: #bbb; }
        input, select { margin-bottom: 15px; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff; }
        button { background: #1DB954; color: #000; padding: 18px; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 1.1em; transition: 0.3s; }
        button:hover { background: #17a34a; transform: scale(1.02); }
    </style>
</head>
<body>
    <h2>Finalize seu Pedido</h2>
    <form id="checkoutForm">
        <label>Informações Pessoais</label>
        <input type="text" name="nome" placeholder="Nome Completo" required>
        <input type="email" name="email" placeholder="E-mail" required>
        <input type="text" name="cpf" placeholder="CPF" required>
        <input type="text" name="telefone" placeholder="WhatsApp" required>
        
        <label>Escolha seu Kit</label>
        <select name="produto" id="produto">
            <option value="kit3">03 Tags Identificadoras</option>
            <option value="kit6">06 Tags Identificadoras (Mais vendido)</option>
            <option value="kit12">12 Tags Identificadoras (Melhor valor)</option>
        </select>
        
        <label>Endereço de Entrega</label>
        <input type="text" name="cep" placeholder="CEP" required>
        <input type="text" name="rua" placeholder="Rua / Logradouro" required>
        <input type="text" name="numero" placeholder="Número" required>
        <input type="text" name="cidade" placeholder="Cidade" required>
        <input type="text" name="estado" placeholder="Estado (UF)" required>
        
        <button type="submit">Ir para Pagamento Seguro</button>
    </form>

    <script>
        document.getElementById('checkoutForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            // Envia para o banco de dados antes de ir para o Mercado Pago
            const res = await fetch('/orders/create', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if(res.ok) {
                // Evento de Conversão no Pixel
                fbq('track', 'Purchase', { value: 0.00, currency: 'BRL' }); 
                
                const produtoSelecionado = document.getElementById('produto').value;
                
                // Mapeamento dos seus links oficiais do Mercado Pago
                const links = {
                    'kit3': 'https://mpago.la/279KBXJ',
                    'kit6': 'https://mpago.la/2A3iSD3',
                    'kit12': 'https://mpago.la/11eaKEp'
                };

                // Redireciona para o link correspondente
                window.location.href = links[produtoSelecionado]; 
            } else {
                alert('Erro ao processar pedido. Tente novamente.');
            }
        };
    </script>
</body>
</html>
