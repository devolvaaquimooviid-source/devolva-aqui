<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Finalizar Compra - Devolva Aqui</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .box { max-width: 500px; margin: auto; background: #111; padding: 20px; border-radius: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #333; color: #fff; box-sizing: border-box; }
        .btn-comprar { width: 100%; padding: 15px; margin-top: 10px; border: none; font-weight: bold; cursor: pointer; color: #000; border-radius: 5px; }
        .kit3 { background: #fff; }
        .kit6 { background: #1DB954; }
        .kit12 { background: #FFD700; }
        h3 { margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Dados de Entrega</h2>
        <form id="checkoutForm">
            <input type="text" id="nome" name="nome" placeholder="Nome Completo" required>
            <input type="text" id="cpf" name="cpf" placeholder="CPF" required>
            <input type="email" id="email" name="email" placeholder="E-mail" required>
            <input type="text" id="cep" name="cep" placeholder="CEP (00000-000)" required>
            <input type="text" id="rua" name="rua" placeholder="Endereço" required>
            <input type="text" id="numero" name="numero" placeholder="Número" required>
            <input type="text" id="cidade" name="cidade" placeholder="Cidade" required>
            
            <h3>Escolha o Kit:</h3>
            <!-- INSIRA OS LINKS DO PAGSEGURO NOS PARÂMETROS ABAIXO -->
            <button type="button" class="btn-comprar kit3" onclick="processarCompra('https://mpago.la/279KBXJ')">COMPRAR KIT 3 TAGS</button>
            <button type="button" class="btn-comprar kit6" onclick="processarCompra('https://mpago.la/2A3iSD3')">COMPRAR KIT 6 TAGS</button>
            <button type="button" class="btn-comprar kit12" onclick="processarCompra('https://mpago.la/11eaKEp')">COMPRAR KIT 12 TAGS</button>
        </form>
    </div>

    <script>
        async function processarCompra(linkPagamento) {
            const form = document.getElementById('checkoutForm');
            
            // Valida se os dados de entrega foram preenchidos
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const data = {
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                email: document.getElementById('email').value,
                cep: document.getElementById('cep').value,
                rua: document.getElementById('rua').value,
                numero: document.getElementById('numero').value,
                cidade: document.getElementById('cidade').value
            };
            
            try {
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    window.location.href = linkPagamento;
                } else {
                    alert("Erro ao registrar dados de entrega no banco.");
                }
            } catch (error) {
                alert("Erro de conexão com o servidor.");
            }
        }
    </script>
</body>
</html>
