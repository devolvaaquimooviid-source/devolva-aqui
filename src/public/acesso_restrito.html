    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #fff; }
        
        header { padding: 20px; text-align: center; font-weight: bold; font-size: 20px; color: #1DB954; border-bottom: 1px solid #111; }

        .container { max-width: 500px; margin: 60px auto; padding: 30px; background: #121212; border-radius: 20px; border: 1px solid #1a1a1a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 24px; margin-bottom: 10px; text-align: center; color: #fff; }
        p.subtitle { color: #aaa; text-align: center; margin-bottom: 30px; font-size: 14px; }

        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #1DB954; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 16px; transition: 0.3s; }
        input:focus { outline: none; border-color: #1DB954; }

        .btn-save { width: 100%; background: #1DB954; color: #000; padding: 16px; border-radius: 50px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn-save:hover { background: #1ed760; transform: scale(1.02); }
        .btn-save:disabled { background: #444; cursor: not-allowed; }

        .back-link { display: block; text-align: center; margin-top: 25px; color: #666; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: #1DB954; }

        footer { text-align: center; padding: 40px; color: #444; font-size: 11px; }
    </style>
</head>

<body>

<header>DEVOLVA AQUI</header>

<div class="container">
    <h1>Gerenciar Conta</h1>
    <p class="subtitle">Atualize seus dados para que possamos entrar em contato caso seu item seja encontrado.</p>

    <form id="perfilForm">
        <div class="form-group">
            <label>Confirmar CPF (Somente números)</label>
            <input type="text" id="cpf" placeholder="00000000000" required>
        </div>

        <div class="form-group">
            <label>Novo E-mail de Contato</label>
            <input type="email" id="email" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
            <label>Novo Telefone (WhatsApp)</label>
            <input type="text" id="telefone" placeholder="(00) 00000-0000" required>
        </div>

        <div class="form-group">
            <label>Nova Cidade / UF</label>
            <input type="text" id="cidade" placeholder="Ex: Florianópolis / SC" required>
        </div>

        <button type="submit" class="btn-save" id="btnSalvar">Salvar Alterações</button>
    </form>

    <a href="/" class="back-link">← Voltar ao Início</a>
</div>

<footer>
    MOOVIDENT INOVA SIMPLES I S - ME | CNPJ: 65.844.964/0001-61<br>
    © Devolva Aqui — Moovi ID
</footer>

<script>
document.getElementById('perfilForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnSalvar');
    btn.disabled = true;
    btn.innerText = 'Salvando...';

    const dados = {
        cpf: document.getElementById('cpf').value,
        email: document.getElementById('email').value,
        telefone: document.getElementById('telefone').value,
        cidade: document.getElementById('cidade').value
    };

    try {
        const res = await fetch('/perfil/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });

        const result = await res.json();

        if (result.success) {
            alert('Dados atualizados com sucesso!');
        } else {
            alert('Erro: CPF não localizado ou falha na atualização.');
        }
    } catch (err) {
        console.error('Erro na requisição:', err);
        alert('Erro de conexão com o servidor.');
    } finally {
        btn.disabled = false;
        btn.innerText = 'Salvar Alterações';
    }
};
</script>

</body>
</html>
